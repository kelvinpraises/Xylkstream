[profile.default]
src = "src"
out = "out"
libs = ["lib"]
auto_detect_solc = true
evm_version = "shanghai"
optimizer = true
optimizer_runs = 200
via_ir = false

remappings = [
    "openzeppelin-contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
    "poseidon-solidity/=lib/poseidon-solidity/contracts/",
    "@openzeppelin/contracts/=lib/openzeppelin-v5/contracts/",
    "@account-abstraction/=lib/account-abstraction/",
    "@safe-global/safe-contracts/=lib/safe-contracts/",
    "@safe-global/safe-modules/=lib/safe-modules/modules/",
]

[rpc_endpoints]
mainnet_rpc = "https://bsc-dataseed.binance.org"
